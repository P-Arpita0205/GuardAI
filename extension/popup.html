<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            width: 250px;
            padding: 16px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #0f172a;
            color: white;
            margin: 0;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }
        .logo { font-size: 24px; }
        .title { font-weight: bold; font-size: 18px; background: linear-gradient(to right, #3b82f6, #9333ea); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .status { font-size: 13px; color: #94a3b8; display: flex; align-items: center; gap: 6px; }
        .status-dot { width: 8px; height: 8px; background: #10b981; border-radius: 50%; }
        .info { font-size: 12px; line-height: 1.5; color: #cbd5e1; margin-top: 12px; }
        .footer { font-size: 10px; color: #64748b; margin-top: 20px; text-align: center; }
    </style>
</head>
<body>
    <div class="header">
        <span class="logo">🛡️</span>
        <span class="title">GuardAI</span>
    </div>
    <div class="status">
        <div class="status-dot"></div>
        Active Protection
    </div>
    <div class="info">
        Navigate to any Instagram profile page to scan for fake accounts and cyberstalkers.
    </div>
    <div class="footer">
        GuardAI v1.0 • Powered by Gemini AI
    </div>
</body>
</html>
