services:
  - type: web
    name: guardai-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: GEMINI_API_KEY
        sync: false

  - type: static_site
    name: guardai-dashboard
    buildCommand: npm install && npm run build
    publishDir: dist
    rootDir: dashboard
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
