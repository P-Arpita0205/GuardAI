services:
  # 1. Backend (FastAPI)
  - type: web
    name: guardai-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: GEMINI_API_KEY
        sync: false

  # 2. Dashboard (React Static Site)
  - type: web
    name: guardai-dashboard
    env: static
    buildCommand: npm install && npm run build
    staticPublishCustomRoutes: # Render sometimes uses this or 'routes'
      - type: rewrite
        source: /*
        destination: /index.html
    # Removing 'publishDir' and 'staticPublishCustomRoutes' if they error
    # Trying the most compatible static site config:
    # env: static
    # buildCommand: npm install && npm run build
    # publishDir: dist
